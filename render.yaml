services:
  - type: web
    name: ps-crm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: RENDER_DATA_DIR
        value: /data
    disk:
      name: pscrm-data
      mountPath: /data
      sizeGB: 1
